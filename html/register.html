<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Car Marketplace</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header>
    <h1>Car Marketplace</h1>
    <nav>
      <a href="index.html" id="home-link" style="display: none;">Home</a>
      <a href="cars.html" id="browse-link" style="display: none;">Browse Cars</a>
      <a href="sell.html" id="sell-link" style="display: none;">Sell Car</a>

      <a href="login.html" id="login-link">Login</a>
      <a href="register.html" id="register-link">Register</a>

      <span id="welcome-user"></span>
      <a href="#" id="logout-link" style="display: none;">Logout</a>
    </nav>
  </header>

  <main>
    <section class="form-section">
      <h2 class="section-title">Create Account</h2>

      <form id="register-form" class="sell-form">
        <input type="text" id="register-name" placeholder="Full Name" required />
        <input type="email" id="register-email" placeholder="Email" required />
        <input type="password" id="register-password" placeholder="Password" required />
        <button type="submit" class="btn">Register</button>
        <p id="register-message" class="form-message"></p>
      </form>
    </section>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
